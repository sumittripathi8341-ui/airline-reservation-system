<!DOCTYPE html>
<html>

<head>
    <title>UPI Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
            padding-top: 60px;
        }

        .box {
            background: white;
            padding: 25px;
            margin: auto;
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 15px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            font-size: 18px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        #loading {
            display: none;
            margin-top: 20px;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>💳 UPI Payment</h2>

        <!-- ✅ SIMPLE MESSAGE -->
        <p>Please complete payment in your UPI app</p>

        <button onclick="payNow()">Pay Now</button>

        <div id="loading">Processing Payment...</div>
    </div>

<script>
function payNow() {

    document.querySelector("button").disabled = true;
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        // ✅ IMPORTANT: use your system IP (not localhost)
        window.location.href = "http://10.233.15.171:8000/payment/?paid=true";
    }, 1500);
}
</script>

</body>

</html>
