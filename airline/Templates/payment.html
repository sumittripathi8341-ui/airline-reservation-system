{% extends 'base.html' %}

{% block content %}

<div id="paymentOverlay"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 9999; text-align: center; padding-top: 15%;">
    <div id="spinnerIcon" class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>

    <div id="overlayContent">
        <h3 class="mt-4" style="color: #003366;" id="processingTitle">Authenticating Transaction</h3>
        <p class="text-muted" id="processingSub">Communicating with Secure Payment Server...</p>

        <div id="successPop" class="alert alert-success" style="display:none;">
            <h4>Payment Successful!</h4>
            <p>Generating Ticket...</p>
        </div>

        <div class="badge badge-info p-3 mt-3">
            Finalizing in: <span id="timerCount">10</span>s
        </div>
    </div>
</div>

<style>
    .payment-container {
        max-width: 580px;
        margin: 40px auto;
    }

    .method-box {
        border: 1px solid #ccc;
        padding: 15px;
        margin-bottom: 10px;
        cursor: pointer;
    }

    .method-box.active {
        border: 2px solid #003366;
    }

    .qr-frame {
        border: 3px solid #003366;
        padding: 10px;
        display: inline-block;
    }

    .confirm-btn,
    .pay-btn {
        padding: 12px;
        width: 100%;
        border: none;
        color: white;
        font-weight: bold;
    }

    .confirm-btn {
        background: green;
        margin-top: 10px;
    }

    .pay-btn {
        background: orange;
    }
</style>

<div class="payment-container">

    <h4>Amount: ₹ {{ total }}</h4>

    <div class="method-box" onclick="selectMethod('UPI', this)">
        📱 UPI Payment
    </div>

    <div id="upiSection" style="display:none; text-align:center;">

        <!-- QR -->
        <div class="qr-frame mb-3" onclick="simulateScan()">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://sumittripathi8341-ui.github.io/airline-reservation-system/fake_upi_pay.html">
        </div>

        <p id="scanStatus">Scan QR to continue</p>

        <button onclick="initiatePayment()" class="confirm-btn">
            I HAVE PAID - PROCEED
        </button>
    </div>

    <form method="post" id="paymentForm">
        {% csrf_token %}
        <input type="hidden" name="method" id="methodField">
    </form>

</div>

<script>

    let selectedMethod = "";
    let isQrScanned = false;
    let isPaymentClicked = false;

    // select method
    function selectMethod(method, el) {
        selectedMethod = method;
        document.getElementById("methodField").value = method;

        document.querySelectorAll(".method-box").forEach(e => e.classList.remove("active"));
        el.classList.add("active");

        document.getElementById("upiSection").style.display = "block";
    }

    // simulate scan
    function simulateScan() {
        isQrScanned = true;
        document.getElementById("scanStatus").innerText = "✅ QR Scanned Successfully";
    }
    window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.get("paid") === "true") {
            initiatePayment();
        }
    }

    // payment
    function initiatePayment() {

        if (!selectedMethod) {
            return alert("Select payment method");
        }

        // 🔥 IMPORTANT VALIDATION
        if (!isQrScanned) {
            return alert("❌ Please scan QR first!");
        }

        // mobile fake pay
        if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {

            let confirmPay = confirm("Click OK to Pay Now (Fake UPI)");

            if (confirmPay) {
                isPaymentClicked = true;
            } else {
                return;
            }

        } else {
            // desktop fallback
            isPaymentClicked = true;
        }

        if (!isPaymentClicked) {
            return alert("❌ Payment not completed!");
        }

        // overlay
        document.getElementById("paymentOverlay").style.display = "block";

        let time = 10;

        let timer = setInterval(() => {
            time--;
            document.getElementById("timerCount").innerText = time;

            if (time <= 8) {
                document.getElementById("spinnerIcon").style.display = "none";
                document.getElementById("successPop").style.display = "block";
            }

            if (time <= 0) {
                clearInterval(timer);
                document.getElementById("paymentForm").submit();
            }

        }, 1000);
    }

</script>

{% endblock %}
