
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Perfect Seat Alignment</title>

    <style>
        body {
            background: #f5f5f5;
            text-align: center;
            font-family: Arial;
        }

        .plane-container {
            position: relative;
            width: 800px;
            height: 400px;   /* 🔥 control height here */
            margin: 20px auto;
        }

        .plane-container img {
            width: 100%;
            height:100%;
        }

        .seat {
            position: absolute;
            width: 13px;
            height: 13px;
            border-radius: 5px;
            border: 2px solid #333;
            cursor: pointer;
            margin-top: -30px;
        }



        .selected {
            text-decoration: none;
            background: #00c853 !important;
        }

        
        .row-label{
    position:absolute;
    left:130px;
    margin-top: -20px;
    font-weight:bolder;
    font-size:16px;
    transform: translateY(-50%);
}
    </style>
</head>

<body>

    <h2>✈ Seat Selection</h2>

    <div class="plane-container">
        <img src="plane2.png">
    </div>
<script>
const container = document.querySelector(".plane-container");

let startX = 130;
let startY = 160;
let gapX = 20;
let gapY = 15;
let sectionGap = 30; // 🔥 GAP BETWEEN ABC and DEF

const rows = ["A", "B", "C", "D", "E", "F"];

rows.forEach((row, rIndex) => {

    /* 🔥 SHIFT LOWER GROUP (DEF) DOWN */
    let extraGap = (rIndex >= 3) ? sectionGap : 0;

    let y = startY + (rIndex * gapY) + extraGap;

    /* LABEL */
    let label = document.createElement("div");
    label.classList.add("row-label");
    label.innerText = row;
    label.style.top = y + "px";

    container.appendChild(label);

    for (let i = 1; i <= 22; i++) {

        if (i === 3 || i === 13 || i === 22) continue;

        let seat = document.createElement("div");
        seat.classList.add("seat");

        let x = startX + (i * gapX);

        seat.style.left = x + "px";
        seat.style.top = y + "px";

        if (Math.random() < 0.3) {
            seat.classList.add("empty");
        }

        seat.addEventListener("click", () => {
            seat.classList.toggle("selected");
        });

        container.appendChild(seat);
    }
});
</script>

</body>

</html>
