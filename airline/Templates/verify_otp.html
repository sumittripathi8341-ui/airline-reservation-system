{% extends 'base.html' %}
{% block content %}

<div class="container mt-5 col-md-4">
    <div class="card p-4 shadow text-center">

        <h4 class="mb-3">Enter OTP 🔑</h4>
        <p class="text-muted">Enter the 6-digit code sent to your email</p>

        <form method="post" id="otp-form">
            {% csrf_token %}

            <!-- OTP BOXES -->
            <div class="d-flex justify-content-between mb-3 otp-boxes">
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
                <input type="text" maxlength="1" class="otp-input" required>
            </div>

            <!-- HIDDEN FIELD -->
            <input type="hidden" name="otp" id="final-otp">

            <button class="btn btn-success w-100">Verify OTP</button>
        </form>

        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

    </div>
</div>

<style>
.otp-boxes {
    gap: 8px;
}

.otp-input {
    width: 45px;
    height: 50px;
    text-align: center;
    font-size: 20px;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    transition: 0.2s;
}

.otp-input:focus {
    border-color: #198754;
    box-shadow: 0 0 5px rgba(25,135,84,0.3);
}
</style>

<script>
const inputs = document.querySelectorAll(".otp-input");
const finalInput = document.getElementById("final-otp");

// AUTO MOVE
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    // BACKSPACE
    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// COMBINE OTP BEFORE SUBMIT
document.getElementById("otp-form").addEventListener("submit", () => {
    let otp = "";
    inputs.forEach(input => otp += input.value);
    finalInput.value = otp;
});
</script>

{% endblock %}
